name: Wavecrate RC release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable target version, for example 19.1.0
        required: true
        type: string
      rc_number:
        description: RC number, for example 1
        required: true
        type: string
      branch:
        description: Release branch, for example release/19.1
        required: true
        type: string
      release_notes:
        description: Optional release notes
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: wavecrate-rc-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve RC target
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}
      target_version: ${{ steps.resolve.outputs.target_version }}
      release_version: ${{ steps.resolve.outputs.release_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      build_number: ${{ steps.resolve.outputs.build_number }}
      build_date: ${{ steps.resolve.outputs.build_date }}
      portal_build_id: ${{ steps.resolve.outputs.portal_build_id }}
      released_at: ${{ steps.resolve.outputs.released_at }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}
      - name: Validate RC inputs
        id: resolve
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          RC_NUMBER: ${{ inputs.rc_number }}
          BRANCH: ${{ inputs.branch }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "version must be MAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          if [[ ! "$RC_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "rc_number must be a positive integer" >&2
            exit 1
          fi
          minor_branch="$(awk -F. '{ print $1 "." $2 }' <<<"$VERSION")"
          if [[ "$BRANCH" != "release/${minor_branch}" ]]; then
            echo "branch must be release/${minor_branch} for version ${VERSION}" >&2
            exit 1
          fi
          manifest_version="$(awk -F '"' '/^version =/ { print $2; exit }' Cargo.toml)"
          if [[ "$manifest_version" != "$VERSION" ]]; then
            echo "Cargo.toml version ${manifest_version} does not match ${VERSION}" >&2
            exit 1
          fi
          target_sha="$(git rev-parse HEAD)"
          release_version="${VERSION}-rc.${RC_NUMBER}"
          release_tag="v${release_version}"
          existing="$(git rev-parse -q --verify "refs/tags/${release_tag}^{commit}" 2>/dev/null || true)"
          if [[ -n "$existing" && "$existing" != "$target_sha" ]]; then
            echo "Tag ${release_tag} already points at ${existing}, not ${target_sha}" >&2
            exit 1
          fi
          build_number="$(git rev-list --count "$target_sha")"
          build_date="$(date -u '+%Y-%m-%d')"
          portal_build_id="wavecrate-${release_version}"
          released_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "target_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "build_date=$build_date" >> "$GITHUB_OUTPUT"
          echo "portal_build_id=$portal_build_id" >> "$GITHUB_OUTPUT"
          echo "released_at=$released_at" >> "$GITHUB_OUTPUT"

  test:
    name: Run RC validation tests
    runs-on: ubuntu-latest
    timeout-minutes: 75
    needs: resolve
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.target_sha }}
      - name: Checkout Radiant submodule
        shell: bash
        env:
          RADIANT_SUBMODULE_DEPLOY_KEY: ${{ secrets.RADIANT_SUBMODULE_DEPLOY_KEY }}
        run: scripts/internal/release/checkout_radiant_submodule.sh
      - name: Read pinned Rust toolchain from rust-toolchain.toml
        id: rust_toolchain
        shell: bash
        run: scripts/internal/release/emit_rust_toolchain_channel.py >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}
      - name: Install Ubuntu audio build dependencies
        shell: bash
        run: scripts/internal/release/setup_ubuntu_release_deps.sh
      - name: Run release validation
        shell: bash
        run: scripts/internal/release/run_release_validation.sh

  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }} RC
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    needs: [resolve, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos
            arch: x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            platform: macos
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ needs.resolve.outputs.target_sha }}
      - name: Checkout Radiant submodule
        shell: bash
        env:
          RADIANT_SUBMODULE_DEPLOY_KEY: ${{ secrets.RADIANT_SUBMODULE_DEPLOY_KEY }}
        run: scripts/internal/release/checkout_radiant_submodule.sh
      - name: Read pinned Rust toolchain from rust-toolchain.toml
        id: rust_toolchain
        shell: bash
        run: scripts/internal/release/emit_rust_toolchain_channel.py >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}
      - name: Fetch ASIO SDK (Windows)
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: ./scripts/internal/release/setup_windows_asio_sdk.ps1
      - name: Build RC zip
        shell: bash
        env:
          BUILD_NUMBER: ${{ needs.resolve.outputs.build_number }}
          TARGET_SHA: ${{ needs.resolve.outputs.target_sha }}
          WAVECRATE_MACOS_SIGNING: ${{ matrix.platform == 'macos' && '1' || '0' }}
          APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          scripts/internal/release/build_release_artifact.sh \
            --target "${{ matrix.target }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --channel rc \
            --version "${{ needs.resolve.outputs.release_version }}" \
            --target-version "${{ needs.resolve.outputs.target_version }}" \
            --build-number "$BUILD_NUMBER" \
            --git-sha "$TARGET_SHA" \
            --build-date "${{ needs.resolve.outputs.build_date }}" \
            --out-dir dist/release
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/release
          if-no-files-found: error

  publish:
    name: Publish GitHub RC
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [resolve, build]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.target_sha }}
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: release-*
          merge-multiple: true
      - name: Assemble RC release files
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.resolve.outputs.release_version }}
          TARGET_SHA: ${{ needs.resolve.outputs.target_sha }}
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          TARGET_BRANCH: ${{ inputs.branch }}
          BUILD_DATE: ${{ needs.resolve.outputs.build_date }}
          RC_NUMBER: ${{ inputs.rc_number }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          set -euo pipefail
          checksum_name="checksums-${RELEASE_VERSION}.txt"
          checksum_sig_name="${checksum_name}.sig"
          scripts/internal/release/assemble_release_files.sh \
            --checksum-name "$checksum_name"
          scripts/internal/release/generate_release_log.sh \
            --channel rc \
            --version "$RELEASE_VERSION" \
            --target-version "${{ needs.resolve.outputs.target_version }}" \
            --target-sha "$TARGET_SHA" \
            --target-branch "$TARGET_BRANCH" \
            --build-date "$BUILD_DATE" \
            --artifact-dir dist/release \
            --checksum-name "$checksum_name" \
            --checksum-sig-name "$checksum_sig_name" \
            --rc-number "$RC_NUMBER" \
            --release-tag "$RELEASE_TAG" \
            --out dist/release/release-log.md
          scripts/internal/release/prepare_github_release_body.py \
            --input dist/release/release-log.md \
            --output dist/github-release-body.md
      - name: Sign release checksums
        env:
          CHECKSUMS_SIGNING_KEY: ${{ secrets.WAVECRATE_CHECKSUMS_ED25519_KEY || secrets.SEMPAL_CHECKSUMS_ED25519_KEY }}
          RELEASE_VERSION: ${{ needs.resolve.outputs.release_version }}
        run: |
          scripts/internal/release/sign_release_checksums.sh \
            --checksum-file "dist/release/checksums-${RELEASE_VERSION}.txt" \
            --signature-file "dist/release/checksums-${RELEASE_VERSION}.txt.sig" \
            --verify-public-key 8Z7dQJBRMbxCFkFMeBYa1FMSWOUm6nePFgoK5c43jT4=
      - name: Publish RC release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: Wavecrate ${{ needs.resolve.outputs.release_version }}
          target_commitish: ${{ needs.resolve.outputs.target_sha }}
          body_path: dist/github-release-body.md
          prerelease: true
          make_latest: false
          files: dist/release/*
      - name: Verify published GitHub RC release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/internal/release/verify_published_release.py \
            --channel rc \
            --version "${{ needs.resolve.outputs.release_version }}" \
            --target-version "${{ needs.resolve.outputs.target_version }}" \
            --commit "${{ needs.resolve.outputs.target_sha }}" \
            --build-date "${{ needs.resolve.outputs.build_date }}" \
            --tag "${{ needs.resolve.outputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --source GitHub \
            --checksum-public-key 8Z7dQJBRMbxCFkFMeBYa1FMSWOUm6nePFgoK5c43jT4=
      - name: Publish PortalSurfer RC release
        shell: bash
        env:
          PORTALSURFER_RELEASE_UPLOAD_TOKEN: ${{ secrets.PORTALSURFER_RELEASE_UPLOAD_TOKEN }}
          PORTALSURFER_RELEASE_UPLOAD_URL: ${{ secrets.PORTALSURFER_RELEASE_UPLOAD_URL }}
        run: |
          scripts/internal/release/publish_portalsurfer_release.sh \
            --channel rc \
            --build-id "${{ needs.resolve.outputs.portal_build_id }}" \
            --build-number "${{ needs.resolve.outputs.build_number }}" \
            --release-version "${{ needs.resolve.outputs.release_version }}" \
            --released-at "${{ needs.resolve.outputs.released_at }}" \
            --artifact-dir dist/release \
            --release-log dist/release/release-log.md \
            --full-changelog-out dist/release/changelog.md
      - name: Verify published PortalSurfer RC release artifacts
        shell: bash
        env:
          PORTALSURFER_RELEASE_UPLOAD_URL: ${{ secrets.PORTALSURFER_RELEASE_UPLOAD_URL }}
        run: |
          upload_base="${PORTALSURFER_RELEASE_UPLOAD_URL:-https://portalsurfer.org/wavecrate/api/v1/release-uploads}"
          upload_base="${upload_base%/}"
          scripts/internal/release/verify_published_release.py \
            --surface portalsurfer \
            --channel rc \
            --version "${{ needs.resolve.outputs.release_version }}" \
            --target-version "${{ needs.resolve.outputs.target_version }}" \
            --commit "${{ needs.resolve.outputs.target_sha }}" \
            --build-date "${{ needs.resolve.outputs.build_date }}" \
            --portal-catalog-url "${upload_base%/release-uploads}/releases" \
            --portal-build-id "${{ needs.resolve.outputs.portal_build_id }}" \
            --build-number "${{ needs.resolve.outputs.build_number }}" \
            --source PortalSurfer \
            --checksum-public-key 8Z7dQJBRMbxCFkFMeBYa1FMSWOUm6nePFgoK5c43jT4=
      - name: Summarize RC release publication
        if: ${{ always() }}
        shell: bash
        env:
          SUMMARY_STATUS: ${{ job.status }}
          PORTALSURFER_RELEASE_UPLOAD_URL: ${{ secrets.PORTALSURFER_RELEASE_UPLOAD_URL }}
        run: |
          upload_base="${PORTALSURFER_RELEASE_UPLOAD_URL:-https://portalsurfer.org/wavecrate/api/v1/release-uploads}"
          upload_base="${upload_base%/}"
          scripts/internal/release/write_release_step_summary.sh \
            --title "RC release publication" \
            --status "$SUMMARY_STATUS" \
            --channel rc \
            --version "${{ needs.resolve.outputs.release_version }}" \
            --target-version "${{ needs.resolve.outputs.target_version }}" \
            --commit "${{ needs.resolve.outputs.target_sha }}" \
            --build-id "${{ needs.resolve.outputs.portal_build_id }}" \
            --build-number "${{ needs.resolve.outputs.build_number }}" \
            --github-tag "${{ needs.resolve.outputs.release_tag }}" \
            --github-release-url "https://github.com/${{ github.repository }}/releases/tag/${{ needs.resolve.outputs.release_tag }}" \
            --portal-catalog-url "${upload_base%/release-uploads}/releases" \
            --portal-build-id "${{ needs.resolve.outputs.portal_build_id }}" \
            --artifact-dir dist/release \
            --checksum-file "dist/release/checksums-${{ needs.resolve.outputs.release_version }}.txt"
