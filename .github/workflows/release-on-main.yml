name: Create release on main

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Resolve version
        id: version
        run: |
          VERSION=$(grep -E '^version = ' Cargo.toml | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "$VERSION" ]]; then
            echo "Failed to resolve version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create release if missing
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git fetch --tags
          TAG="v${VERSION}"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists; skipping release."
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        id: tag
      - name: Generate release notes
        if: ${{ steps.tag.outputs.tag != '' }}
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git tag "$TAG" 2>/dev/null || true
          git cliff --config cliff.toml --tag "$TAG" --latest > release-notes.md
      - name: Publish release
        if: ${{ steps.tag.outputs.tag != '' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
      - name: Trigger changelog workflow
        if: ${{ steps.tag.outputs.tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/changelog-on-release.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"tag\":\"${{ steps.tag.outputs.tag }}\"}}"
      - name: Trigger release build
        if: ${{ steps.tag.outputs.tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/release-build.yml/dispatches" \
            -d "{\"ref\":\"main\",\"inputs\":{\"tag\":\"${{ steps.tag.outputs.tag }}\"}}"
