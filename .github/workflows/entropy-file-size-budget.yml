name: Entropy - File size budget

on:
  schedule:
    # Weekly (Monday) at 03:30 UTC.
    - cron: "30 3 * * 1"
  workflow_dispatch:
    inputs:
      open_pr:
        description: Open a PR with safe auto-fixes (prune allowlist entries now under budget)
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: entropy-file-size-budget
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Run full file size budget check
        id: full_check
        shell: bash
        run: |
          set +e
          ./scripts/check_file_size_budget.sh --all
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          set -e
      - name: Build allowlist report
        shell: bash
        run: |
          mkdir -p dist/entropy
          ./scripts/report_file_size_budget_allowlist.sh > dist/entropy/file_budget_allowlist.md
      - name: Create or update tracking issue
        uses: actions/github-script@v7
        env:
          REPORT_PATH: dist/entropy/file_budget_allowlist.md
          FULL_CHECK_EXIT_CODE: ${{ steps.full_check.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');

            const title = 'Tech debt: file size budget allowlist';
            const labels = ['tech-debt', 'maintenance'];
            const exitCode = process.env.FULL_CHECK_EXIT_CODE || 'unknown';
            const reportPath = process.env.REPORT_PATH;

            const report = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, 'utf8')
              : `# File size budget allowlist report\n\nMissing report file: \`${reportPath}\``;

            const header = [
              `Full budget check: \`scripts/check_file_size_budget.sh --all\` exit_code=\`${exitCode}\``,
              '',
              report.trim(),
            ].join('\n');

            const { owner, repo } = context.repo;

            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue in:title "${title}"`,
              per_page: 5,
            });

            const existing = (search.data.items || []).find((item) => !item.pull_request);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body: header,
              });
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body: header,
              labels,
            });

  open_pr:
    name: Optional PR (safe auto-fixes)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.open_pr }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Prepare changes
        id: pr_prep
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/prune_file_size_budget_allowlist.sh
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create PR (safe entropy auto-fixes)
        if: ${{ steps.pr_prep.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ github.event.repository.default_branch }}
          branch: entropy/prune-file-size-budget-allowlist
          delete-branch: true
          commit-message: "chore(entropy): prune file size budget allowlist"
          title: "chore(entropy): prune file size budget allowlist"
          body: |
            Automated maintenance PR generated by `entropy-file-size-budget.yml`.

            Changes:
            - Remove entries from `docs/file_size_budget_allowlist.txt` that are now within budget (<= 400 LOC) or missing.
          add-paths: |
            docs/file_size_budget_allowlist.txt
