name: Wavecrate release train prep

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable target version, for example 0.19.1
        required: true
        type: string
      source_ref:
        description: Source commit, branch, or tag used as the release branch base
        required: true
        default: main
        type: string
      push_branch:
        description: Push or update release/X.Y after validation
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: wavecrate-release-train-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release train
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_ref }}
      - name: Checkout Radiant submodule
        shell: bash
        env:
          RADIANT_SUBMODULE_DEPLOY_KEY: ${{ secrets.RADIANT_SUBMODULE_DEPLOY_KEY }}
        run: scripts/internal/release/checkout_radiant_submodule.sh
      - name: Read pinned Rust toolchain from rust-toolchain.toml
        id: rust_toolchain
        shell: bash
        run: scripts/internal/release/emit_rust_toolchain_channel.py >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}
      - name: Configure release bot identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Prepare release train
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          PUSH_BRANCH: ${{ inputs.push_branch }}
        run: |
          set -euo pipefail
          args=(--version "$VERSION" --source-ref HEAD)
          if [[ "$PUSH_BRANCH" == "true" ]]; then
            args+=(--push)
          else
            args+=(--dry-run)
          fi
          scripts/internal/release/prepare_release_train.py "${args[@]}"
      - name: Summarize release train prep
        if: ${{ always() }}
        shell: bash
        env:
          SUMMARY_STATUS: ${{ job.status }}
        run: |
          scripts/internal/release/write_release_step_summary.sh \
            --title "Release train preparation" \
            --status "$SUMMARY_STATUS" \
            --version "${{ inputs.version }}" \
            --target-version "${{ inputs.version }}" \
            --commit "$(git rev-parse HEAD)" \
            --note "Source ref: ${{ inputs.source_ref }}" \
            --note "Push branch: ${{ inputs.push_branch }}"
