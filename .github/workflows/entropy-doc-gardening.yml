name: Entropy - Doc gardening

on:
  schedule:
    # Weekly (Wednesday) at 03:50 UTC.
    - cron: "50 3 * * 3"
  workflow_dispatch:
    inputs:
      open_pr:
        description: Open a PR with safe auto-fixes (prune allowlist entries; fix trivial doc link rot)
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: entropy-doc-gardening
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build docs reports
        shell: bash
        run: |
          mkdir -p dist/entropy
          ./scripts/report_markdown_links_all.sh > dist/entropy/markdown_links.md
          ./scripts/report_env_vars_drift.sh > dist/entropy/env_vars_drift.md
          ./scripts/report_file_size_budget_allowlist.sh > dist/entropy/file_budget_allowlist.md
      - name: Create or update tracking issue
        uses: actions/github-script@v7
        env:
          LINKS_REPORT: dist/entropy/markdown_links.md
          ENV_REPORT: dist/entropy/env_vars_drift.md
          ALLOWLIST_REPORT: dist/entropy/file_budget_allowlist.md
        with:
          script: |
            const fs = require('fs');
            const title = 'Tech debt: doc gardening';
            const marker = '<!-- sempal-doc-gardening -->';

            function readOrPlaceholder(path) {
              return fs.existsSync(path)
                ? fs.readFileSync(path, 'utf8').trim()
                : `Missing report file: \`${path}\``;
            }

            const links = readOrPlaceholder(process.env.LINKS_REPORT);
            const envs = readOrPlaceholder(process.env.ENV_REPORT);
            const allowlist = readOrPlaceholder(process.env.ALLOWLIST_REPORT);

            const body = [
              marker,
              'Scheduled report for documentation maintenance and drift detection.',
              '',
              '## (1) Stale docs links',
              '',
              links,
              '',
              '## (2) Env vars used but undocumented',
              '',
              envs,
              '',
              '## (3) Allowlist entries that can be removed',
              '',
              allowlist,
            ].join('\n');

            const { owner, repo } = context.repo;
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue in:title "${title}"`,
              per_page: 5,
            });

            const existing = (search.data.items || []).find((item) => !item.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body,
              });
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['maintenance', 'tech-debt'],
            });
      - name: Prepare optional PR (safe doc gardening auto-fixes)
        id: pr_prep
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.open_pr }}
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/prune_file_size_budget_allowlist.sh
          ./scripts/fix_trivial_doc_links.sh
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create PR (safe entropy auto-fixes)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.open_pr && steps.pr_prep.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ github.event.repository.default_branch }}
          branch: entropy/doc-gardening-trivial-fixes
          delete-branch: true
          commit-message: "chore(entropy): doc gardening trivial fixes"
          title: "chore(entropy): doc gardening trivial fixes"
          body: |
            Automated maintenance PR generated by `entropy-doc-gardening.yml`.

            Changes:
            - Prune `docs/file_size_budget_allowlist.txt` entries that are now within budget (<= 400 LOC) or missing.
            - Rewrite known legacy dev-doc links from `manual/` to `docs/` when the destination exists.
          add-paths: |
            docs/file_size_budget_allowlist.txt
            docs/
            README.md
            AGENTS.md
            .github/
