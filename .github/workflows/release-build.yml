name: Build release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build (e.g. v0.378.0 or nightly)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} asset
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: x86_64
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x86_64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: aarch64
            use_cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos
            arch: x86_64
            use_cross: false
          - os: macos-14
            target: aarch64-apple-darwin
            platform: macos
            arch: aarch64
            use_cross: false
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Read pinned Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          set -euo pipefail
          channel="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("rust-toolchain.toml").read_text(encoding="utf-8"))
          print(data.get("toolchain", {}).get("channel", "stable"))
          PY
          )"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}
      - name: Install Linux audio deps
        if: ${{ matrix.platform == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config
      - name: Fetch ASIO SDK (Windows)
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          git lfs install --local
          git clone --depth 1 --recurse-submodules --shallow-submodules https://github.com/audiosdk/asio "$env:GITHUB_WORKSPACE/asio"
          git -C "$env:GITHUB_WORKSPACE/asio" submodule update --init --recursive
          git -C "$env:GITHUB_WORKSPACE/asio" lfs pull
          $asioRoot = Join-Path $env:GITHUB_WORKSPACE "asio"
          $asioHeader = Get-ChildItem -Path $asioRoot -Recurse -Filter "asiodrivers.h" -File | Select-Object -First 1
          if (-not $asioHeader) {
            throw "ASIO header not found under $asioRoot"
          }
          $sdkDir = Split-Path -Parent (Split-Path -Parent $asioHeader.FullName)
          if (-not (Test-Path (Join-Path $sdkDir "host")) -or -not (Test-Path (Join-Path $sdkDir "common"))) {
            throw "ASIO SDK directory not found for $($asioHeader.FullName)"
          }
          "CPAL_ASIO_DIR=$sdkDir" >> $env:GITHUB_ENV
      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: cargo install cross --locked
      - name: Set release metadata
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [[ "$TAG" == "nightly" ]]; then
            echo "RELEASE_CHANNEL=nightly" >> "$GITHUB_ENV"
            echo "RELEASE_VERSION=" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=nightly" >> "$GITHUB_ENV"
          else
            echo "RELEASE_CHANNEL=stable" >> "$GITHUB_ENV"
            echo "RELEASE_VERSION=${TAG#v}" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          fi
      - name: Build release zip
        env:
          WAVECRATE_CARGO_BIN: ${{ matrix.use_cross && 'cross' || 'cargo' }}
        shell: bash
        run: |
          scripts/internal/release/build_release_zip.sh \
            --target "${{ matrix.target }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --channel "${RELEASE_CHANNEL}" \
            ${RELEASE_VERSION:+--version "${RELEASE_VERSION}"} \
            --out-dir dist/release
      - name: Build installer binary (Windows)
        if: ${{ matrix.platform == 'windows' }}
        shell: bash
        run: |
          cargo build --release -p wavecrate-installer --bin wavecrate-installer --target "${{ matrix.target }}"
      - name: Sign Windows executables
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        env:
          WAVECRATE_WINDOWS_SIGN_PFX_BASE64: ${{ secrets.WAVECRATE_WINDOWS_SIGN_PFX_BASE64 }}
          WAVECRATE_WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WAVECRATE_WINDOWS_SIGN_PFX_PASSWORD }}
        run: |
          if (-not $env:WAVECRATE_WINDOWS_SIGN_PFX_BASE64) {
            "Missing WAVECRATE_WINDOWS_SIGN_PFX_BASE64 secret; publishing unsigned Windows binaries."
            exit 0
          }
          if (-not $env:WAVECRATE_WINDOWS_SIGN_PFX_PASSWORD) {
            "Missing WAVECRATE_WINDOWS_SIGN_PFX_PASSWORD secret; publishing unsigned Windows binaries."
            exit 0
          }
          "WAVECRATE_WINDOWS_SIGNED=1" >> $env:GITHUB_ENV
          $targetDir = Join-Path $env:GITHUB_WORKSPACE "target/${{ matrix.target }}/release"
          $binaries = @(
            (Join-Path $targetDir "wavecrate.exe"),
            (Join-Path $targetDir "wavecrate-updater.exe"),
            (Join-Path $targetDir "wavecrate-installer.exe")
          )
          foreach ($binary in $binaries) {
            if (-not (Test-Path $binary)) {
              throw "Missing binary for signing: $binary"
            }
          }
          $certPath = Join-Path $env:RUNNER_TEMP "wavecrate-codesign.pfx"
          [System.IO.File]::WriteAllBytes(
            $certPath,
            [System.Convert]::FromBase64String($env:WAVECRATE_WINDOWS_SIGN_PFX_BASE64)
          )
          foreach ($binary in $binaries) {
            & signtool sign /fd SHA256 /f $certPath /p $env:WAVECRATE_WINDOWS_SIGN_PFX_PASSWORD /tr http://timestamp.digicert.com /td SHA256 $binary
            if ($LASTEXITCODE -ne 0) {
              throw "signtool sign failed for $binary"
            }
          }
          Remove-Item -LiteralPath $certPath -Force
      - name: Verify Windows signatures
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          if ($env:WAVECRATE_WINDOWS_SIGNED -ne "1") {
            "Windows signing was skipped; skipping Authenticode verification."
            exit 0
          }
          $targetDir = Join-Path $env:GITHUB_WORKSPACE "target/${{ matrix.target }}/release"
          $binaries = @(
            (Join-Path $targetDir "wavecrate.exe"),
            (Join-Path $targetDir "wavecrate-updater.exe"),
            (Join-Path $targetDir "wavecrate-installer.exe")
          )
          $rows = @("path`tstatus`tsigner_subject`ttimestamp_subject")
          foreach ($binary in $binaries) {
            $signature = Get-AuthenticodeSignature -FilePath $binary
            if ($signature.Status -ne "Valid") {
              throw "Authenticode verification failed for $binary: $($signature.Status)"
            }
            $signer = if ($signature.SignerCertificate) { $signature.SignerCertificate.Subject } else { "missing" }
            $timestamp = if ($signature.TimeStamperCertificate) { $signature.TimeStamperCertificate.Subject } else { "missing" }
            $rows += "$binary`t$($signature.Status)`t$signer`t$timestamp"
          }
          $reportPath = Join-Path $env:GITHUB_WORKSPACE "dist/release/windows-authenticode-report.txt"
          [System.IO.File]::WriteAllLines($reportPath, $rows)
      - name: Rebuild signed release zip (Windows)
        if: ${{ matrix.platform == 'windows' }}
        env:
          WAVECRATE_SKIP_BUILD: "1"
        shell: bash
        run: |
          if [[ "${WAVECRATE_WINDOWS_SIGNED:-}" != "1" ]]; then
            echo "Windows signing was skipped; keeping the unsigned release zip."
            exit 0
          fi
          scripts/internal/release/build_release_zip.sh \
            --target "${{ matrix.target }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --channel "${RELEASE_CHANNEL}" \
            ${RELEASE_VERSION:+--version "${RELEASE_VERSION}"} \
            --out-dir dist/release
      - name: Uniquify checksums entry
        shell: bash
        run: |
          mv dist/release/checksums-entry.txt \
            "dist/release/checksums-entry-${{ matrix.platform }}-${{ matrix.arch }}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/release
          if-no-files-found: error

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Set release metadata
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          if [[ "$TAG" == "nightly" ]]; then
            echo "CHECKSUMS_NAME=checksums-nightly.txt" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=nightly" >> "$GITHUB_ENV"
          else
            echo "CHECKSUMS_NAME=checksums-v${TAG#v}.txt" >> "$GITHUB_ENV"
            echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          fi
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: release-*
          merge-multiple: true
      - name: Assemble release files
        run: |
          mkdir -p dist/release
          cp dist/artifacts/*.zip dist/release/
          shopt -s nullglob
          entries=(dist/artifacts/checksums-entry-*.txt)
          if [[ ${#entries[@]} -eq 0 ]]; then
            echo "No checksums entry files found." >&2
            exit 1
          fi
          cat "${entries[@]}" > "dist/release/${CHECKSUMS_NAME}"
      - name: Sign checksums
        env:
          CHECKSUMS_SIGNING_KEY: ${{ secrets.WAVECRATE_CHECKSUMS_ED25519_KEY || secrets.SEMPAL_CHECKSUMS_ED25519_KEY }}
        run: |
          if [[ -z "${CHECKSUMS_SIGNING_KEY}" ]]; then
            echo "Missing WAVECRATE_CHECKSUMS_ED25519_KEY secret." >&2
            exit 1
          fi
          key_path="dist/release/checksums-signing-key.pem"
          printf "%s" "$CHECKSUMS_SIGNING_KEY" > "$key_path"
          openssl pkeyutl -sign -inkey "$key_path" -rawin \
            -in "dist/release/${CHECKSUMS_NAME}" \
            -out "dist/release/${CHECKSUMS_NAME}.sig.bin"
          base64 -w 0 "dist/release/${CHECKSUMS_NAME}.sig.bin" \
            > "dist/release/${CHECKSUMS_NAME}.sig"
          rm -f "$key_path"
      - name: Verify checksums signature
        env:
          CHECKSUMS_SIGNING_KEY: ${{ secrets.WAVECRATE_CHECKSUMS_ED25519_KEY || secrets.SEMPAL_CHECKSUMS_ED25519_KEY }}
        run: |
          if [[ -z "${CHECKSUMS_SIGNING_KEY}" ]]; then
            echo "Missing WAVECRATE_CHECKSUMS_ED25519_KEY secret." >&2
            exit 1
          fi
          key_path="dist/release/checksums-signing-key.pem"
          pub_der="dist/release/checksums-signing-key.pub.der"
          sig_bin="dist/release/${CHECKSUMS_NAME}.sig.bin"
          printf "%s" "$CHECKSUMS_SIGNING_KEY" > "$key_path"
          openssl pkey -in "$key_path" -pubout -outform DER -out "$pub_der"
          tail -c 32 "$pub_der" | base64 -w 0 > "dist/release/checksums-pubkey.txt"
          openssl pkeyutl -verify -pubin -inkey "$pub_der" -rawin \
            -in "dist/release/${CHECKSUMS_NAME}" \
            -sigfile "$sig_bin"
          expected_pubkey="8Z7dQJBRMbxCFkFMeBYa1FMSWOUm6nePFgoK5c43jT4="
          actual_pubkey="$(cat "dist/release/checksums-pubkey.txt")"
          if [[ "$actual_pubkey" != "$expected_pubkey" ]]; then
            echo "Public key mismatch: $actual_pubkey" >&2
            exit 1
          fi
          rm -f "$key_path" "$pub_der" "dist/release/checksums-pubkey.txt" \
            "$sig_bin"
      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/release/*

  publish-frontend:
    name: Upload PortalSurfer Wavecrate downloads
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Verify PortalSurfer upload secret
        env:
          UPLOAD_TOKEN: ${{ secrets.PORTALSURFER_RELEASE_UPLOAD_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$UPLOAD_TOKEN" ]]; then
            echo "Missing required secret: PORTALSURFER_RELEASE_UPLOAD_TOKEN" >&2
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: release-*
          merge-multiple: true
      - name: Upload Wavecrate downloads
        shell: bash
        env:
          RELEASE_PUBLISHED_AT: ${{ github.event.release.published_at || '' }}
          UPLOAD_TOKEN: ${{ secrets.PORTALSURFER_RELEASE_UPLOAD_TOKEN }}
          UPLOAD_URL: ${{ secrets.PORTALSURFER_RELEASE_UPLOAD_URL }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/artifacts/*.zip)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release zip files found in downloaded artifacts." >&2
            exit 1
          fi

          tag="${{ github.event.release.tag_name || inputs.tag }}"
          if [[ -z "$tag" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          if [[ "$tag" == "nightly" ]]; then
            version="nightly"
          else
            version="${tag#v}"
          fi
          safe_tag="$(printf '%s' "$tag" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+|-+$//g')"
          if [[ -z "$safe_tag" ]]; then
            echo "Release tag did not produce a safe build id component: $tag" >&2
            exit 1
          fi
          short_sha="${GITHUB_SHA::8}"
          build_id="wavecrate-${safe_tag}-${short_sha}"
          released_at="${RELEASE_PUBLISHED_AT:-}"
          if [[ -z "$released_at" ]]; then
            released_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          fi

          upload_base="${UPLOAD_URL:-https://portalsurfer.org/wavecrate/api/v1/release-uploads}"
          upload_base="${upload_base%/}"
          if [[ "$upload_base" != */release-uploads ]]; then
            echo "PORTALSURFER_RELEASE_UPLOAD_URL must end with /release-uploads." >&2
            exit 1
          fi
          catalog_url="${upload_base%/release-uploads}/releases"
          response_dir="$(mktemp -d)"
          uploaded_names=()

          for file in "${files[@]}"; do
            file_name="$(basename "$file")"
            if [[ ! -s "$file" ]]; then
              echo "Release file is empty: $file" >&2
              exit 1
            fi
            sha256="$(sha256sum "$file" | awk '{ print $1 }')"
            encoded_name="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$file_name")"
            response_file="$response_dir/$file_name.json"
            curl --fail-with-body --retry 3 --retry-delay 2 \
              --request PUT \
              --header "Authorization: Bearer $UPLOAD_TOKEN" \
              --header "Content-Type: application/zip" \
              --header "X-Wavecrate-Build-Number: ${GITHUB_RUN_NUMBER}" \
              --header "X-Wavecrate-Release-Version: $version" \
              --header "X-Wavecrate-Released-At: $released_at" \
              --header "X-Wavecrate-Sha256: $sha256" \
              --data-binary "@$file" \
              "$upload_base/$build_id/files/$encoded_name" > "$response_file"
            python3 - "$response_file" "$build_id" "$file_name" "$sha256" <<'PY'
          import json
          import sys

          response_path, expected_build, expected_name, expected_sha = sys.argv[1:]
          response = json.loads(open(response_path, encoding="utf-8").read())
          release = response.get("release") or {}
          file = response.get("file") or {}
          if release.get("build_id") != expected_build:
              raise SystemExit(f"Uploaded release id mismatch: {release.get('build_id')} != {expected_build}")
          if file.get("name") != expected_name:
              raise SystemExit(f"Uploaded file name mismatch: {file.get('name')} != {expected_name}")
          if file.get("sha256") != expected_sha:
              raise SystemExit(f"Uploaded file sha mismatch: {file.get('sha256')} != {expected_sha}")
          if not isinstance(file.get("size_bytes"), int) or file["size_bytes"] <= 0:
              raise SystemExit("Uploaded file size was not recorded")
          PY
            uploaded_names+=("$file_name")
          done

          catalog_file="$response_dir/releases.json"
          curl --fail-with-body --retry 3 --retry-delay 2 "$catalog_url" > "$catalog_file"
          python3 - "$catalog_file" "$build_id" "${uploaded_names[@]}" <<'PY'
          import json
          import sys

          catalog_path = sys.argv[1]
          expected_build = sys.argv[2]
          expected_files = set(sys.argv[3:])
          catalog = json.loads(open(catalog_path, encoding="utf-8").read())
          releases = catalog.get("releases") or []
          release = next((item for item in releases if item.get("build_id") == expected_build), None)
          if release is None:
              raise SystemExit(f"Release catalog does not list {expected_build}")
          catalog_files = {item.get("name") for item in release.get("files") or []}
          missing = sorted(expected_files - catalog_files)
          if missing:
              raise SystemExit(f"Release catalog is missing files: {', '.join(missing)}")
          print(f"Uploaded {len(expected_files)} Wavecrate release file(s) to {expected_build}")
          PY
