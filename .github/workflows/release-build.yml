name: Wavecrate nightly release

on:
  schedule:
    # GitHub cron is UTC. This is 21:30 in Amsterdam during summer time and
    # 20:30 during winter time.
    - cron: "30 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wavecrate-nightly-release-main
  cancel-in-progress: true

jobs:
  resolve-main:
    name: Resolve main nightly target
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.target.outputs.target_sha }}
      build_number: ${{ steps.target.outputs.build_number }}
      nightly_version: ${{ steps.target.outputs.nightly_version }}
      target_version: ${{ steps.target.outputs.target_version }}
      portal_build_id: ${{ steps.target.outputs.portal_build_id }}
      previous_nightly_sha: ${{ steps.target.outputs.previous_nightly_sha }}
      released_at: ${{ steps.target.outputs.released_at }}
      build_date: ${{ steps.target.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Resolve main commit
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          target_sha="$(gh api "repos/$REPOSITORY/commits/main" --jq '.sha')"
          previous_nightly_sha="$(scripts/internal/release/github_ref_sha.sh --allow-missing "$REPOSITORY" tags/nightly)"
          build_number="$(git rev-list --count "$target_sha")"
          short_sha="${target_sha::8}"
          target_version="$(awk -F '"' '/^version =/ { print $2; exit }' Cargo.toml)"
          build_date="$(date -u '+%Y%m%d')"
          nightly_version="${target_version}-nightly.${build_date}+${short_sha}"
          portal_build_id="wavecrate-${nightly_version}"
          released_at="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

          if [[ -z "$build_number" || ! "$build_number" =~ ^[0-9]+$ ]]; then
            echo "Could not resolve numeric build number for $target_sha: $build_number" >&2
            exit 1
          fi

          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "nightly_version=$nightly_version" >> "$GITHUB_OUTPUT"
          echo "target_version=$target_version" >> "$GITHUB_OUTPUT"
          echo "portal_build_id=$portal_build_id" >> "$GITHUB_OUTPUT"
          echo "previous_nightly_sha=$previous_nightly_sha" >> "$GITHUB_OUTPUT"
          echo "released_at=$released_at" >> "$GITHUB_OUTPUT"
          echo "build_date=${build_date:0:4}-${build_date:4:2}-${build_date:6:2}" >> "$GITHUB_OUTPUT"

  release-log:
    name: Generate nightly release log
    runs-on: ubuntu-latest
    needs: resolve-main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-main.outputs.target_sha }}
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Generate release log
        shell: bash
        env:
          TARGET_SHA: ${{ needs.resolve-main.outputs.target_sha }}
          BUILD_NUMBER: ${{ needs.resolve-main.outputs.build_number }}
          NIGHTLY_VERSION: ${{ needs.resolve-main.outputs.nightly_version }}
          PREVIOUS_NIGHTLY_SHA: ${{ needs.resolve-main.outputs.previous_nightly_sha }}
          RELEASED_AT: ${{ needs.resolve-main.outputs.released_at }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          git fetch --tags --force
          git tag -d nightly >/dev/null 2>&1 || true

          if existing="$(git rev-parse -q --verify "refs/tags/${NIGHTLY_VERSION}^{commit}" 2>/dev/null)"; then
            if [[ "$existing" != "$TARGET_SHA" ]]; then
              echo "Nightly version tag ${NIGHTLY_VERSION} already points at ${existing}, expected ${TARGET_SHA}." >&2
              exit 1
            fi
          else
            git tag "$NIGHTLY_VERSION" "$TARGET_SHA"
          fi

          previous="${PREVIOUS_NIGHTLY_SHA:-}"
          if [[ -n "$previous" ]] && ! git cat-file -e "${previous}^{commit}" 2>/dev/null; then
            echo "Previous nightly ref does not resolve to a commit: $previous" >&2
            previous=""
          fi
          if [[ -n "$previous" ]] && ! git merge-base --is-ancestor "$previous" "$TARGET_SHA"; then
            echo "Previous nightly is not an ancestor of main; generating a bounded log window." >&2
            previous=""
          fi

          if [[ -n "$previous" && "$previous" == "$TARGET_SHA" ]]; then
            cat > dist/release/release-log.md <<EOF
          # Wavecrate ${NIGHTLY_VERSION}

          - Build: ${BUILD_NUMBER}
          - Version: ${NIGHTLY_VERSION}
          - Commit: ${TARGET_SHA}
          - Previous nightly: ${previous}
          - Generated: ${RELEASED_AT}

          No code changes since the previous nightly. This run refreshed the nightly artifacts from the current main commit.
          EOF
          else
            range=""
            if [[ -n "$previous" ]]; then
              range="${previous}..${TARGET_SHA}"
            else
              first_in_window="$(git rev-list --max-count=80 "$TARGET_SHA" | tail -n 1)"
              if parent="$(git rev-parse "${first_in_window}^" 2>/dev/null)"; then
                range="${parent}..${TARGET_SHA}"
              else
                range="$TARGET_SHA"
              fi
            fi

            args=(--config cliff.toml --tag "$NIGHTLY_VERSION")
            if [[ -n "$range" ]]; then
              args+=("$range")
            fi
            git cliff "${args[@]}" > /tmp/wavecrate-release-log-body.md
            if ! grep -Eq '^[[:space:]]*-' /tmp/wavecrate-release-log-body.md; then
              git log --no-merges --pretty=format:'- %s' "$range" > /tmp/wavecrate-release-log-body.md
            fi
            if [[ ! -s /tmp/wavecrate-release-log-body.md ]]; then
              echo "- No commit messages were found for this nightly window." > /tmp/wavecrate-release-log-body.md
            fi

            {
              echo "# Wavecrate ${NIGHTLY_VERSION}"
              echo
              echo "- Build: ${BUILD_NUMBER}"
              echo "- Version: ${NIGHTLY_VERSION}"
              echo "- Commit: ${TARGET_SHA}"
              if [[ -n "$previous" ]]; then
                echo "- Previous nightly: ${previous}"
              else
                echo "- Previous nightly: unavailable"
              fi
              echo "- Generated: ${RELEASED_AT}"
              echo
              cat /tmp/wavecrate-release-log-body.md
            } > dist/release/release-log.md
          fi

          if [[ ! -s dist/release/release-log.md ]]; then
            echo "Generated release log is empty." >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-log
          path: dist/release/release-log.md
          if-no-files-found: error

  build:
    name: Build ${{ matrix.platform }} ${{ matrix.arch }} nightly
    runs-on: ${{ matrix.os }}
    needs: resolve-main
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
            arch: x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos
            arch: x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            platform: macos
            arch: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          ref: ${{ needs.resolve-main.outputs.target_sha }}
      - name: Checkout Radiant submodule
        shell: bash
        env:
          RADIANT_SUBMODULE_DEPLOY_KEY: ${{ secrets.RADIANT_SUBMODULE_DEPLOY_KEY }}
        run: scripts/internal/release/checkout_radiant_submodule.sh
      - name: Read pinned Rust toolchain
        id: rust_toolchain
        shell: bash
        run: scripts/internal/release/emit_rust_toolchain_channel.py >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}
      - name: Fetch ASIO SDK (Windows)
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: ./scripts/internal/release/setup_windows_asio_sdk.ps1
      - name: Build nightly zip
        shell: bash
        env:
          BUILD_NUMBER: ${{ needs.resolve-main.outputs.build_number }}
          TARGET_SHA: ${{ needs.resolve-main.outputs.target_sha }}
          WAVECRATE_MACOS_SIGNING: ${{ matrix.platform == 'macos' && '1' || '0' }}
          APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          scripts/internal/release/build_release_artifact.sh \
            --target "${{ matrix.target }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --channel nightly \
            --version "${{ needs.resolve-main.outputs.nightly_version }}" \
            --target-version "${{ needs.resolve-main.outputs.target_version }}" \
            --build-number "$BUILD_NUMBER" \
            --git-sha "$TARGET_SHA" \
            --build-date "${{ needs.resolve-main.outputs.build_date }}" \
            --out-dir dist/release
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/release
          if-no-files-found: error

  publish-github:
    name: Publish GitHub nightly
    runs-on: ubuntu-latest
    needs: [resolve-main, release-log, build]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-main.outputs.target_sha }}
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: release-*
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: release-log
          path: dist/release
      - name: Assemble release files
        shell: bash
        run: scripts/internal/release/assemble_release_files.sh --checksum-name checksums-nightly.txt
      - name: Sign release checksums
        env:
          CHECKSUMS_SIGNING_KEY: ${{ secrets.WAVECRATE_CHECKSUMS_ED25519_KEY || secrets.SEMPAL_CHECKSUMS_ED25519_KEY }}
        run: |
          scripts/internal/release/sign_release_checksums.sh \
            --checksum-file dist/release/checksums-nightly.txt \
            --signature-file dist/release/checksums-nightly.txt.sig \
            --verify-public-key 8Z7dQJBRMbxCFkFMeBYa1FMSWOUm6nePFgoK5c43jT4=
      - name: Publish nightly tags
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          TARGET_SHA: ${{ needs.resolve-main.outputs.target_sha }}
          NIGHTLY_VERSION: ${{ needs.resolve-main.outputs.nightly_version }}
        run: |
          set -euo pipefail
          existing_version_sha="$(scripts/internal/release/github_ref_sha.sh \
            --allow-missing \
            "$REPOSITORY" \
            "tags/${NIGHTLY_VERSION}")"
          if [[ -n "$existing_version_sha" && "$existing_version_sha" != "$TARGET_SHA" ]]; then
            echo "Immutable nightly tag ${NIGHTLY_VERSION} points at ${existing_version_sha}, expected ${TARGET_SHA}." >&2
            exit 1
          fi
          if [[ -z "$existing_version_sha" ]]; then
            gh api \
              --method POST \
              "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/tags/${NIGHTLY_VERSION}" \
              -f sha="${TARGET_SHA}"
          fi

          if ! gh api \
            --method PATCH \
            "repos/${{ github.repository }}/git/refs/tags/nightly" \
            -f sha="${TARGET_SHA}" \
            -F force=true; then
            gh api \
              --method POST \
              "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/tags/nightly" \
              -f sha="${TARGET_SHA}"
          fi
      - name: Remove stale nightly assets
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          scripts/internal/release/prune_github_release_assets.sh \
            --tag nightly \
            --repo "$REPOSITORY" \
            --release-dir dist/release
      - name: Upload nightly release assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: Wavecrate Nightly
          target_commitish: ${{ needs.resolve-main.outputs.target_sha }}
          body_path: dist/release/release-log.md
          prerelease: true
          make_latest: false
          files: dist/release/*

  publish-frontend:
    name: Upload PortalSurfer nightly downloads
    runs-on: ubuntu-latest
    needs: [resolve-main, publish-github]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-main.outputs.target_sha }}
      - name: Verify PortalSurfer upload secret
        env:
          UPLOAD_TOKEN: ${{ secrets.PORTALSURFER_RELEASE_UPLOAD_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$UPLOAD_TOKEN" ]]; then
            echo "Missing required secret: PORTALSURFER_RELEASE_UPLOAD_TOKEN" >&2
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: release-*
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: release-log
          path: dist/release
      - name: Upload Wavecrate downloads
        shell: bash
        env:
          UPLOAD_TOKEN: ${{ secrets.PORTALSURFER_RELEASE_UPLOAD_TOKEN }}
          UPLOAD_URL: ${{ secrets.PORTALSURFER_RELEASE_UPLOAD_URL }}
          TARGET_SHA: ${{ needs.resolve-main.outputs.target_sha }}
          BUILD_NUMBER: ${{ needs.resolve-main.outputs.build_number }}
          RELEASE_VERSION: ${{ needs.resolve-main.outputs.nightly_version }}
          PORTAL_BUILD_ID: ${{ needs.resolve-main.outputs.portal_build_id }}
          RELEASED_AT: ${{ needs.resolve-main.outputs.released_at }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/artifacts/*.zip)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release zip files found in downloaded artifacts." >&2
            exit 1
          fi

          version="$RELEASE_VERSION"
          build_id="$PORTAL_BUILD_ID"
          released_at="${RELEASED_AT}"

          upload_base="${UPLOAD_URL:-https://portalsurfer.org/wavecrate/api/v1/release-uploads}"
          upload_base="${upload_base%/}"
          if [[ "$upload_base" != */release-uploads ]]; then
            echo "PORTALSURFER_RELEASE_UPLOAD_URL must end with /release-uploads." >&2
            exit 1
          fi
          api_base="${upload_base%/release-uploads}"
          catalog_url="$api_base/releases"
          full_changelog_url="$api_base/changelog"
          response_dir="$(mktemp -d)"
          changelog_file="dist/release/release-log.md"
          full_changelog_file="dist/release/changelog.md"
          uploaded_names=()

          for file in "${files[@]}"; do
            file_name="$(basename "$file")"
            if [[ ! -s "$file" ]]; then
              echo "Release file is empty: $file" >&2
              exit 1
            fi
            sha256="$(sha256sum "$file" | awk '{ print $1 }')"
            encoded_name="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$file_name")"
            response_file="$response_dir/$file_name.json"
            curl --fail-with-body --retry 3 --retry-delay 2 \
              --request PUT \
              --header "Authorization: Bearer $UPLOAD_TOKEN" \
              --header "Content-Type: application/zip" \
              --header "X-Wavecrate-Build-Number: ${BUILD_NUMBER}" \
              --header "X-Wavecrate-Release-Version: $version" \
              --header "X-Wavecrate-Released-At: $released_at" \
              --header "X-Wavecrate-Sha256: $sha256" \
              --data-binary "@$file" \
              "$upload_base/$build_id/files/$encoded_name" > "$response_file"
            python3 - "$response_file" "$build_id" "$BUILD_NUMBER" "$file_name" "$sha256" <<'PY'
          import json
          import sys

          response_path, expected_build, expected_build_number, expected_name, expected_sha = sys.argv[1:]
          response = json.loads(open(response_path, encoding="utf-8").read())
          release = response.get("release") or {}
          file = response.get("file") or {}
          if release.get("build_id") != expected_build:
              raise SystemExit(f"Uploaded release id mismatch: {release.get('build_id')} != {expected_build}")
          if release.get("build_number") != int(expected_build_number):
              raise SystemExit(f"Uploaded release build number mismatch: {release.get('build_number')} != {expected_build_number}")
          if file.get("name") != expected_name:
              raise SystemExit(f"Uploaded file name mismatch: {file.get('name')} != {expected_name}")
          if file.get("sha256") != expected_sha:
              raise SystemExit(f"Uploaded file sha mismatch: {file.get('sha256')} != {expected_sha}")
          if not isinstance(file.get("size_bytes"), int) or file["size_bytes"] <= 0:
              raise SystemExit("Uploaded file size was not recorded")
          PY
            uploaded_names+=("$file_name")
          done

          changelog_response_file="$response_dir/changelog-upload.json"
          curl --fail-with-body --retry 3 --retry-delay 2 \
            --request PUT \
            --header "Authorization: Bearer $UPLOAD_TOKEN" \
            --header "Content-Type: text/markdown; charset=utf-8" \
            --header "X-Wavecrate-Build-Number: ${BUILD_NUMBER}" \
            --header "X-Wavecrate-Release-Version: $version" \
            --header "X-Wavecrate-Released-At: $released_at" \
            --data-binary "@$changelog_file" \
            "$upload_base/$build_id/changelog" > "$changelog_response_file"
          python3 - "$changelog_response_file" "$build_id" "$BUILD_NUMBER" <<'PY'
          import json
          import sys

          response_path, expected_build, expected_build_number = sys.argv[1:]
          response = json.loads(open(response_path, encoding="utf-8").read())
          release = response.get("release") or {}
          changelog = response.get("changelog") or {}
          if release.get("build_id") != expected_build:
              raise SystemExit(f"Uploaded changelog release id mismatch: {release.get('build_id')} != {expected_build}")
          if release.get("build_number") != int(expected_build_number):
              raise SystemExit(f"Uploaded changelog build number mismatch: {release.get('build_number')} != {expected_build_number}")
          if changelog.get("format") != "markdown":
              raise SystemExit("Uploaded changelog was not recorded as markdown")
          if not changelog.get("url"):
              raise SystemExit("Uploaded changelog did not expose a public URL")
          PY

          catalog_file="$response_dir/releases.json"
          curl --fail-with-body --retry 3 --retry-delay 2 "$catalog_url" > "$catalog_file"
          python3 - "$catalog_file" "$build_id" "$BUILD_NUMBER" "${uploaded_names[@]}" <<'PY'
          import json
          import sys

          catalog_path = sys.argv[1]
          expected_build = sys.argv[2]
          expected_build_number = int(sys.argv[3])
          expected_files = set(sys.argv[4:])
          catalog = json.loads(open(catalog_path, encoding="utf-8").read())
          releases = catalog.get("releases") or []
          release = next((item for item in releases if item.get("build_id") == expected_build), None)
          if release is None:
              raise SystemExit(f"Release catalog does not list {expected_build}")
          if release.get("build_number") != expected_build_number:
              raise SystemExit(f"Release catalog build number mismatch: {release.get('build_number')} != {expected_build_number}")
          catalog_files = {item.get("name") for item in release.get("files") or []}
          missing = sorted(expected_files - catalog_files)
          if missing:
              raise SystemExit(f"Release catalog is missing files: {', '.join(missing)}")
          changelog = release.get("changelog") or {}
          if changelog.get("format") != "markdown" or not changelog.get("url"):
              raise SystemExit("Release catalog is missing the markdown changelog link")
          print(f"Uploaded {len(expected_files)} Wavecrate release file(s) to {expected_build}")
          PY

          changelog_catalog_file="$response_dir/changelog-catalog.json"
          curl --fail-with-body --retry 3 --retry-delay 2 \
            "$catalog_url/$build_id/changelog" > "$changelog_catalog_file"
          python3 - "$changelog_catalog_file" "$build_id" "$changelog_file" <<'PY'
          import json
          import sys

          catalog_path, expected_build, changelog_path = sys.argv[1:]
          response = json.loads(open(catalog_path, encoding="utf-8").read())
          if response.get("build_id") != expected_build:
              raise SystemExit(f"Fetched changelog id mismatch: {response.get('build_id')} != {expected_build}")
          body = (response.get("changelog") or {}).get("body", "").strip()
          expected_body = open(changelog_path, encoding="utf-8").read().strip()
          if body != expected_body:
              raise SystemExit("Fetched changelog body does not match generated release log")
          print(f"Uploaded Wavecrate release log to {expected_build}")
          PY

          scripts/internal/release/assemble_portal_changelog.py \
            --catalog-url "$catalog_url" \
            --current-build-id "$build_id" \
            --current-log "$changelog_file" \
            --existing-changelog-url "$full_changelog_url" \
            --generated-at "$released_at" \
            --output "$full_changelog_file"

          full_changelog_response_file="$response_dir/full-changelog-upload.json"
          curl --fail-with-body --retry 3 --retry-delay 2 \
            --request PUT \
            --header "Authorization: Bearer $UPLOAD_TOKEN" \
            --header "Content-Type: text/markdown; charset=utf-8" \
            --header "X-Wavecrate-Changelog-Title: Wavecrate changelog" \
            --data-binary "@$full_changelog_file" \
            "$upload_base/changelog" > "$full_changelog_response_file"
          python3 - "$full_changelog_response_file" <<'PY'
          import json
          import sys

          response = json.loads(open(sys.argv[1], encoding="utf-8").read())
          changelog = response.get("changelog") or {}
          if changelog.get("format") != "markdown":
              raise SystemExit("Uploaded full changelog was not recorded as markdown")
          if not changelog.get("url"):
              raise SystemExit("Uploaded full changelog did not expose a public URL")
          PY

          full_changelog_catalog_file="$response_dir/full-changelog-catalog.json"
          curl --fail-with-body --retry 3 --retry-delay 2 \
            "$full_changelog_url" > "$full_changelog_catalog_file"
          python3 - "$full_changelog_catalog_file" "$full_changelog_file" <<'PY'
          import json
          import sys

          catalog_path, changelog_path = sys.argv[1:]
          response = json.loads(open(catalog_path, encoding="utf-8").read())
          body = (response.get("changelog") or {}).get("body", "").strip()
          expected_body = open(changelog_path, encoding="utf-8").read().strip()
          if body != expected_body:
              raise SystemExit("Fetched full changelog body does not match generated changelog")
          print("Uploaded Wavecrate full changelog")
          PY
