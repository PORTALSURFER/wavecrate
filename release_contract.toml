app_name = "wavecrate"
repo_slug = "PORTALSURFER/wavecrate"
channels = ["nightly"]
targets = [
  "x86_64-pc-windows-msvc",
  "x86_64-apple-darwin",
  "aarch64-apple-darwin"
]

[platform_labels]
windows = "windows"
linux = "linux"
macos = "macos"
x86_64 = "x86_64"
aarch64 = "aarch64"

[templates]
nightly_asset = "{APP_NAME}-nightly-{platform}-{arch}.zip"
nightly_checksums = "checksums-nightly.txt"
nightly_checksums_sig = "checksums-nightly.txt.sig"

[archive_layout]
root_dir = "{APP_NAME}"
files = ["{APP_NAME}", "{APP_NAME}.exe"]
optional_dirs = []
