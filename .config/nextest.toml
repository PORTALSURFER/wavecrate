# Nextest profiles for local development and CI.
#
# Keep the default profile unfiltered so full CI continues to exercise the
# entire suite. The `quick` profile trims slow recovery tests and support-tool
# binaries from the normal edit loop.

[profile.quick]
default-filter = '''
not binary_id(=sempal::bench/ann_index)
and not binary_id(=sempal::bench/tagging)
and not binary_id(=sempal::bin/sempal)
and not test(=app::controller::ui::drag_drop_controller::drag_effects::folder_moves::tests::folder_sample_move_db_write_failure_rolls_back_source_and_keeps_journal_for_recovery)
'''
